# yaml-language-server: $schema=https://json.schemastore.org/github-action.json

name: setup-rust
description: Prepare Rust toolchain, caches, and CI tools

inputs:
  sharedKey:
    description: Cache key prefix (e.g. ci-elph-ubuntu-24.04)
    required: true
  installCross:
    description: Install cross and rustup targets for release builds
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: 1.96.1
        components: clippy, rustfmt

    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.10

    - name: Setup Cargo cache
      uses: swatinem/rust-cache@v2.9.1
      with:
        cache-on-failure: true
        shared-key: ${{ inputs.sharedKey }}

    - name: Install CI tools with cargo-binstall
      shell: bash
      run: |
        set -euo pipefail
        if ! command -v cargo-binstall >/dev/null 2>&1; then
          cargo install cargo-binstall --locked
        fi
        cargo binstall --locked -y cargo-nextest
        if [ "${{ inputs.installCross }}" = "true" ]; then
          cargo binstall --locked -y cross
          while read -r target; do
            rustup target add "$target"
          done < ./scripts/cross-targets.sh
        fi
      env:
        BINSTALL_DISABLE_TELEMETRY: true

    - name: Export Rust CI environment
      shell: bash
      run: |
        {
          echo "RUSTC_WRAPPER=sccache"
          echo "SCCACHE_GHA_ENABLED=true"
          echo "CARGO_INCREMENTAL=0"
          echo "CARGO_TERM_COLOR=always"
        } >> "$GITHUB_ENV"
