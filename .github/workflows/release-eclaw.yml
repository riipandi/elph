# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Release Eclaw

on:
  push:
    tags: ["eclaw-v*.*.*"]

permissions:
  contents: write

concurrency:
  group: release-eclaw-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    uses: ./.github/workflows/_release-app.yml
    with:
      app: eclaw
