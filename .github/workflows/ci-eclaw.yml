# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: CI Eclaw

on:
  push:
    branches: ["**"]
    tags-ignore: ["*"]
    paths:
      - "eclaw/**"
      - "crates/elph-core/**"
      - "crates/elph-agent/**"
      - "crates/elph-ai/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "Makefile"
      - ".github/**"
  pull_request:
    paths:
      - "eclaw/**"
      - "crates/elph-core/**"
      - "crates/elph-agent/**"
      - "crates/elph-ai/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "Makefile"
      - ".github/**"

permissions:
  contents: read

concurrency:
  group: ci-eclaw-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/_ci-app.yml
    with:
      app: eclaw
