# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Release Owly

on:
  push:
    tags: ["owly-v*.*.*"]

permissions:
  contents: write

concurrency:
  group: release-owly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    uses: ./.github/workflows/_release-app.yml
    with:
      app: owly
