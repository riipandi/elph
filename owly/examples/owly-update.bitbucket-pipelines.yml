# Bitbucket Pipelines: automated Owly openwiki/ refresh (code-mode).
# Copy into bitbucket-pipelines.yml (or include as a custom pipeline).
#
# Repository variables / secured variables:
#   OWLY_PROVIDER, OWLY_MODEL_ID
#   OPENCODE_API_KEY / OPENROUTER_API_KEY / ANTHROPIC_API_KEY / OPENAI_API_KEY

image: rust:1-bookworm

pipelines:
  custom:
    owly-update:
      - step:
          name: Owly openwiki update
          script:
            - cargo install --locked owly
            - owly --update --print
          artifacts:
            - openwiki/**
