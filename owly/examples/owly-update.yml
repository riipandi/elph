# GitHub Actions: automated Owly openwiki/ refresh (code-mode).
# Copy to .github/workflows/owly-update.yml or let `owly --init` create it once.
#
# Secrets/vars (set what your provider needs):
#   secrets.OPENCODE_API_KEY / OPENROUTER_API_KEY / ANTHROPIC_API_KEY / OPENAI_API_KEY
#   vars.OWLY_PROVIDER (default opencode), vars.OWLY_MODEL_ID (default big-pickle)

name: Owly Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install owly
        run: cargo install --locked owly

      - name: Update documentation
        env:
          OWLY_PROVIDER: ${{ vars.OWLY_PROVIDER || 'opencode' }}
          OWLY_MODEL_ID: ${{ vars.OWLY_MODEL_ID || 'big-pickle' }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: owly --update --print

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: |
            openwiki
            AGENTS.md
            CLAUDE.md
            .github/workflows/owly-update.yml
          commit-message: "docs: update openwiki via owly"
          title: "docs: Owly openwiki update"
          body: |
            Automated documentation refresh from `owly --update --print`.
          branch: owly/update-docs
