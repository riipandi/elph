# GitLab CI: automated Owly openwiki/ refresh (code-mode).
# Include from .gitlab-ci.yml or paste as a job.
#
# CI variables (masked as needed):
#   OWLY_PROVIDER, OWLY_MODEL_ID
#   OPENCODE_API_KEY / OPENROUTER_API_KEY / ANTHROPIC_API_KEY / OPENAI_API_KEY

owly-update:
  image: rust:1-bookworm
  stage: build
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
  script:
    - cargo install --locked owly
    - owly --update --print
  artifacts:
    paths:
      - openwiki/
    when: always
  # Create an MR via a follow-up job or project automation if desired.
